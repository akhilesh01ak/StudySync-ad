    <line x1="-120" y1="-15" x2="-20" y2="-18" stroke="#2E75B6" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <line x1="-120" y1="10" x2="-20" y2="8" stroke="#2E75B6" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <line x1="20" y1="-44" x2="120" y2="-40" stroke="#2E75B6" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <line x1="20" y1="-18" x2="120" y2="-15" stroke="#2E75B6" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
    <line x1="20" y1="8" x2="120" y2="10" stroke="#2E75B6" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  </g>
