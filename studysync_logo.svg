  <path d="M176 180 Q130 195 125 230" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9"/>
  <circle cx="336" cy="140" r="35" fill="#FFFFFF" opacity="0.9"/>
  <path d="M336 180 Q382 195 387 230" stroke="#FFFFFF" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M210 130 Q256 90 302 130" stroke="#D6E4F0" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="10,8"/>
